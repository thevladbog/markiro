<!-- @dsCard group="Components" viewport="700x360" name="Обратная связь" subtitle="Alert, Toast, Progress, RingCounter, BoxFill, SignalOverlay" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"></head>
<body style="margin:0;font-family:var(--font-ui);background:var(--surface-page)">
<div style="display:flex;flex-direction:column;gap:12px;padding:16px 20px">
  <div style="display:flex;gap:12px">
    <div style="flex:1.6;display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:var(--r-2);background:var(--err-bg);border:1px solid var(--err-border)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--err-fg)" stroke-width="2"><path d="M12 3l10 18H2z"/><path d="M12 10v4M12 17v1.5"/></svg>
      <div style="flex:1"><div style="font:600 14px/20px var(--font-ui);color:var(--err-fg)">Принтер не отвечает</div><div style="font:var(--text-body);color:var(--fg-2)">Проверьте кабель и питание.</div></div>
      <button style="height:32px;padding:0 12px;border-radius:var(--r-2);border:1px solid var(--line-strong);background:var(--surface-card);font:600 13px/1 var(--font-ui);color:var(--fg-1)">Повторить</button>
    </div>
    <div style="flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r-2);background:var(--surface-inverse);color:var(--fg-on-inverse);box-shadow:var(--shadow-3);align-self:flex-start">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>
      <span style="font:var(--text-body)">Отчёт отправлен в Честный ЗНАК</span>
    </div>
  </div>
  <div style="display:flex;gap:20px;align-items:center">
    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;justify-content:space-between;font:var(--text-body-sm);color:var(--fg-2)"><span>Задание № 214</span><span style="font-family:var(--font-mono)">47 213 / 50 000</span></div>
      <div style="height:6px;background:var(--surface-panel);border:1px solid var(--line);border-radius:2px;overflow:hidden"><div style="width:94%;height:100%;background:var(--ok-solid)"></div></div>
      <div style="display:flex;justify-content:space-between;font:var(--text-body-sm);color:var(--fg-2);margin-top:8px"><span>Очередь отправки</span><span style="font-family:var(--font-mono)">1 240</span></div>
      <div style="height:6px;background:var(--surface-panel);border:1px solid var(--line);border-radius:2px;overflow:hidden"><div style="width:31%;height:100%;background:var(--info-solid)"></div></div>
    </div>
    <div style="position:relative;width:104px;height:104px">
      <svg width="104" height="104"><circle cx="52" cy="52" r="46" fill="none" stroke="var(--line)" stroke-width="7"/><circle cx="52" cy="52" r="46" fill="none" stroke="var(--ok-solid)" stroke-width="7" stroke-dasharray="289" stroke-dashoffset="87" transform="rotate(-90 52 52)"/></svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font:600 24px/1 var(--font-mono);color:var(--fg-1)">70%</span><span style="font:var(--text-caption);color:var(--fg-3)">короб</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:grid;grid-template-columns:repeat(6,22px);gap:4px">
        <div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div>
        <div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div>
        <div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;background:var(--ok-solid);border:1.5px solid var(--ok-solid)"></div><div style="width:22px;height:22px;border-radius:2px;border:1.5px solid var(--line-strong)"></div><div style="width:22px;height:22px;border-radius:2px;border:1.5px solid var(--line-strong)"></div><div style="width:22px;height:22px;border-radius:2px;border:1.5px solid var(--line-strong)"></div><div style="width:22px;height:22px;border-radius:2px;border:1.5px solid var(--line-strong)"></div>
      </div>
      <div style="font:600 20px/1 var(--font-mono);color:var(--fg-1)">14 <span style="color:var(--fg-3)">/ 18</span></div>
    </div>
  </div>
  <div style="display:flex;gap:12px">
    <div style="flex:1;background:var(--warn-solid);border-radius:var(--r-2);color:#33250E;display:flex;align-items:center;gap:14px;padding:14px 18px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#33250E" stroke-width="2.5"><path d="M8 8h12v12H8z"/><path d="M16 8V4H4v12h4"/></svg>
      <div><div style="font:700 20px/1.2 var(--font-ui)">Дубликат</div><div style="font:400 14px/1.3 var(--font-ui);opacity:.85">SignalOverlay — миниатюра полноэкранного сигнала</div></div>
    </div>
    <div style="flex:1;background:var(--ok-solid);border-radius:var(--r-2);color:#0B2A17;display:flex;align-items:center;gap:14px;padding:14px 18px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0B2A17" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
      <div><div style="font:700 20px/1.2 var(--font-ui)">Код принят</div><div style="font:400 14px/1.3 var(--font-ui);opacity:.85">вспышка ~400 мс + короткий тон</div></div>
    </div>
  </div>
</div>
</body></html>
