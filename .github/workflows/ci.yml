name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: markiro
          POSTGRES_PASSWORD: markiro
          POSTGRES_DB: markiro
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U markiro" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://markiro:markiro@localhost:5432/markiro
      BETTER_AUTH_SECRET: insecure-dummy-ci-placeholder-not-a-secret
      BETTER_AUTH_URL: http://localhost:3000
      ADMIN_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm --filter @markiro/db db:migrate
      - run: pnpm turbo lint typecheck test build

  station-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install Linux webkit deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - run: pnpm install --frozen-lockfile
      # `tauri::generate_context!` needs `apps/station/dist` to exist at
      # compile time, so the webview (and its workspace deps' `dist/`) must
      # be built before cargo ever touches src-tauri.
      - name: Build station webview + workspace deps
        run: pnpm turbo build --filter '@markiro/station...'
      - name: cargo build + test (station core)
        run: |
          cargo build --manifest-path apps/station/src-tauri/Cargo.toml
          cargo test  --manifest-path apps/station/src-tauri/Cargo.toml

  station-windows-build:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - run: pnpm install --frozen-lockfile
      # vite can't resolve `@markiro/ui`/`@markiro/db`/`@markiro/domain`
      # without their `dist/` present, and `tauri build` needs the webview
      # built for the same reason as the `station-rust` job above.
      - name: Build station webview + workspace deps
        run: pnpm turbo build --filter '@markiro/station...'
      - name: Build the Windows installer (NSIS)
        run: pnpm --filter @markiro/station tauri build
